<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yönetim Paneli — gözbebeğim.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:       #D4537E;
      --pink-dark:  #993556;
      --pink-light: #FBEAF0;
      --pink-border:#F4C0D1;
      --border:     0.5px solid #e8e0e4;
      --bg:         #fdf8fa;
      --card-bg:    #ffffff;
      --text:       #1a1a1a;
      --text-sec:   #666;
      --radius-md:  12px;
      --radius-lg:  16px;
      --surface:    #f5f0f3;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(253,248,250,.92);
      backdrop-filter: blur(12px);
      border-bottom: var(--border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 500; color: var(--text);
      text-decoration: none;
    }
    .nav-brand span { color: var(--pink); }
    .nav-actions { display: flex; gap: 10px; align-items: center; }
    .nav-link {
      font-size: 13px; color: var(--text-sec);
      text-decoration: none; padding: 6px 14px;
      border: var(--border); border-radius: 20px;
      transition: all .2s;
    }
    .nav-link:hover { background: var(--pink-light); color: var(--pink-dark); }
    .logout-btn {
      font-size: 13px; color: #E24B4A; background: none; border: none; cursor: pointer;
    }

    /* LAYOUT */
    .page { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

    .header-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2rem;
    }
    .header-row h1 {
      font-family: 'Playfair Display', serif;
      font-size: 24px; font-weight: 500;
    }

    .btn-create {
      background: var(--pink); color: #fff; text-decoration: none;
      font-size: 14px; font-weight: 600; padding: 10px 18px;
      border-radius: 20px; border: none; cursor: pointer;
      box-shadow: 0 4px 12px rgba(212, 83, 126, 0.15);
      transition: all 0.2s;
    }
    .btn-create:hover { background: var(--pink-dark); transform: translateY(-1px); }

    /* CARDS */
    .card-list { display: flex; flex-direction: column; gap: 1rem; }
    .org-card {
      background: var(--card-bg); border: var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.01);
      display: flex; flex-direction: column; gap: 12px;
      transition: all 0.2s;
    }
    .org-card:hover { transform: translateY(-2px); border-color: var(--pink-border); }

    .org-header { display: flex; align-items: center; gap: 12px; }
    .org-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--pink-light); font-size: 22px;
      display: flex; align-items: center; justify-content: center;
    }
    .org-title { flex: 1; }
    .org-title h3 { font-size: 16px; font-weight: 600; color: var(--text); }
    .org-title p { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
    .org-badge {
      font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 12px;
    }

    /* Farklı Etkinlik Temaları İçin Renk Kodları */
    .theme-dogum { border-left: 5px solid #D4537E; }
    .theme-dogum .org-avatar { background: #FBEAF0; }
    .theme-dogum .org-badge { background: #FBEAF0; color: #993556; }

    .theme-sunnet { border-left: 5px solid #1D9E75; }
    .theme-sunnet .org-avatar { background: #E1F5EE; }
    .theme-sunnet .org-badge { background: #E1F5EE; color: #0F6E56; }

    .theme-yasgunu { border-left: 5px solid #D9A01B; }
    .theme-yasgunu .org-avatar { background: #FCF4DF; }
    .theme-yasgunu .org-badge { background: #FCF4DF; color: #8F6306; }

    .theme-mezuniyet { border-left: 5px solid #845ADF; }
    .theme-mezuniyet .org-avatar { background: #F0ECFC; }
    .theme-mezuniyet .org-badge { background: #F0ECFC; color: #532BB3; }

    .org-footer {
      display: flex; justify-content: space-between; align-items: center;
      border-top: var(--border); padding-top: 12px; margin-top: 4px;
    }
    .url-share {
      font-size: 12px; color: var(--text-sec);
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      background: var(--surface); padding: 5px 12px; border-radius: 20px;
    }
    .url-share:hover { background: var(--pink-light); color: var(--pink-dark); }
    .btn-view {
      font-size: 12px; font-weight: 600; color: #fff; background: var(--pink);
      text-decoration: none; padding: 6px 14px; border-radius: 20px;
      transition: background 0.15s;
    }
    .btn-view:hover { background: var(--pink-dark); }

    .empty-state {
      text-align: center; padding: 4rem 2rem;
      color: var(--text-sec); font-size: 14px;
    }
    .empty-state p { margin-bottom: 1.5rem; }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/dashboard">göz<span>bebeğim</span>.com</a>
  <div class="nav-actions">
    <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
  </div>
</nav>

<div class="page">
  <div class="header-row">
    <h1 id="welcomeTitle">Yönetim Paneli</h1>
    <a href="/create-organization" class="btn-create">[+ Yeni Organizasyon]</a>
  </div>

  <div class="card-list" id="orgsContainer">
    <!-- Organizasyon Kartları Burada Listelenecek -->
    <div style="text-align:center;padding:2rem;color:var(--text-sec)">Yükleniyor...</div>
  </div>
</div>

<script>
  // Auth Kontrolü
  const userData = localStorage.getItem("user");
  if (!userData) {
    window.location.href = "/login";
  }
  const user = JSON.parse(userData);

  document.getElementById("welcomeTitle").textContent = `Hoş geldin, ${user.first_name}! 👋`;

  // Sayfa açıldığında organizasyonları yükle
  window.addEventListener("DOMContentLoaded", () => {
    fetch(`/api/organizations/parent/${user.id}`)
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          renderOrganizations(data.organizations);
        } else {
          showEmptyState();
        }
      })
      .catch(err => {
        console.error("Fetch orgs error:", err);
        showEmptyState();
      });
  });

  function renderOrganizations(orgs) {
    const container = document.getElementById("orgsContainer");
    container.innerHTML = "";

    if (orgs.length === 0) {
      showEmptyState();
      return;
    }

    const emojis = { "Doğum": "🍼", "Sünnet": "✂️", "Yaş Günü": "🎂", "Mezuniyet": "🎓" };
    const classNames = { "Doğum": "theme-dogum", "Sünnet": "theme-sunnet", "Yaş Günü": "theme-yasgunu", "Mezuniyet": "theme-mezuniyet" };

    orgs.forEach(org => {
      const card = document.createElement("div");
      
      const themeClass = classNames[org.type] || "theme-dogum";
      const emoji = emojis[org.type] || "👶";
      card.className = `org-card ${themeClass}`;

      const dateStr = new Date(org.date).toLocaleDateString("tr-TR", {
        day: "numeric", month: "long", year: "numeric"
      });

      const fullUrl = `${window.location.origin}/${org.parent_slug}/${org.slug}`;

      card.innerHTML = `
        <div class="org-header">
          <div class="org-avatar">${emoji}</div>
          <div class="org-title">
            <h3>${org.child_name}'in ${org.type} Listesi</h3>
            <p>📍 ${org.city} &nbsp;·&nbsp; 📅 ${dateStr}</p>
          </div>
          <span class="org-badge">${org.type}</span>
        </div>
        <div class="org-footer">
          <div class="url-share" onclick="copyUrl('${fullUrl}', this)">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2m-6 12h8a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-8a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z"/></svg>
            <span>WhatsApp Linkini Kopyala</span>
          </div>
          <a href="/${org.parent_slug}/${org.slug}" class="btn-view">Sayfayı Gör</a>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function showEmptyState() {
    const container = document.getElementById("orgsContainer");
    container.innerHTML = `
      <div class="empty-state">
        <p>Henüz aktif bir hediye listesi/organizasyon oluşturmadınız.</p>
        <a href="/create-organization" class="btn-create">[+ İlk Listeni Oluştur]</a>
      </div>
    `;
  }

  function copyUrl(url, element) {
    navigator.clipboard.writeText(url).then(() => {
      const span = element.querySelector("span");
      const originalText = span.textContent;
      span.textContent = "Kopyalandı! ✓";
      element.style.background = "var(--pink-light)";
      element.style.color = "var(--pink-dark)";
      setTimeout(() => {
        span.textContent = originalText;
        element.style.background = "";
        element.style.color = "";
      }, 2000);
    }).catch(err => {
      console.error("Copy error:", err);
    });
  }

  function logout() {
    localStorage.removeItem("user");
    window.location.href = "/login";
  }
</script>
</body>
</html>
