<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şifremi Unuttum — gözbebeğim.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:       #D4537E;
      --pink-dark:  #993556;
      --pink-light: #FBEAF0;
      --pink-border:#F4C0D1;
      --border:     0.5px solid #e8e0e4;
      --bg:         #fff9fb;
      --card-bg:    #ffffff;
      --text:       #1a1a1a;
      --text-sec:   #666;
      --radius-md:  12px;
      --surface:    #f5f0f3;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    .bg-circle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .bg-circle-1 { width: 500px; height: 500px; top: -150px; left: -150px; background: rgba(212, 83, 126, 0.05); }
    .bg-circle-2 { width: 350px; height: 350px; bottom: -100px; right: -100px; background: rgba(29, 158, 117, 0.05); }

    .card {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
      background: var(--card-bg);
      border: var(--border);
      border-radius: var(--radius-md);
      padding: 2.25rem 2rem;
      box-shadow: 0 8px 32px rgba(212, 83, 126, 0.03);
      text-align: center;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.5rem;
      text-decoration: none;
      display: inline-block;
    }
    .brand span { color: var(--pink); }

    .subtitle {
      font-size: 14px;
      color: var(--text-sec);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .form-group {
      text-align: left;
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: var(--border);
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      background: #fafafa;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus {
      border-color: var(--pink);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(212, 83, 126, 0.05);
    }

    .btn {
      width: 100%;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--pink-dark);
    }

    .error-msg {
      display: none;
      background: #FDF2F2;
      border: 1px solid #FDE8E8;
      color: #E24B4A;
      font-size: 13px;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .switch-link {
      margin-top: 1.75rem;
      font-size: 13.5px;
      color: var(--text-sec);
    }

    .switch-link a {
      color: var(--pink);
      text-decoration: none;
      font-weight: 600;
    }

    .switch-link a:hover {
      text-decoration: underline;
    }

    .step-section {
      display: none;
    }
    .step-section.active {
      display: block;
      animation: fadeIn 0.3s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Professional visual info box for demo codes */
    .demo-code-box {
      margin-top: 1rem;
      background: #EFF6FF;
      border: 1px dashed #BFDBFE;
      color: #1E40AF;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>

  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <div class="card">
    <a href="/" class="brand">göz<span>bebeğim</span>.com</a>
    
    <div class="error-msg" id="errorMsg"></div>

    <!-- STEP 1: Request Reset Code -->
    <div class="step-section active" id="step1">
      <p class="subtitle">Şifrenizi sıfırlamak için hesabınıza kayıtlı e-posta adresinizi veya telefon numaranızı girin.</p>
      
      <form id="requestForm" onsubmit="handleRequest(event)">
        <div class="form-group">
          <label for="emailOrPhone">E-posta veya Telefon Numaranız</label>
          <input type="text" id="emailOrPhone" required placeholder="ayse@demir.com veya 0555 123 4567" />
        </div>
        <button type="submit" class="btn">Sıfırlama Kodu Gönder</button>
      </form>
    </div>

    <!-- STEP 2: Verify Code and Reset Password -->
    <div class="step-section" id="step2">
      <p class="subtitle">İletişim adresinize gönderilen 6 haneli sıfırlama kodunu ve yeni şifrenizi girin.</p>
      
      <div class="demo-code-box" id="demoCodeBox"></div>

      <form id="resetForm" onsubmit="handleReset(event)" style="margin-top: 1rem;">
        <div class="form-group">
          <label for="resetCode">Şifre Sıfırlama Kodu</label>
          <input type="text" id="resetCode" required placeholder="123456" pattern="\d{6}" maxlength="6" style="text-align: center; letter-spacing: 4px; font-size: 18px; font-weight: bold;" />
        </div>
        <div class="form-group">
          <label for="newPassword">Yeni Şifreniz</label>
          <input type="password" id="newPassword" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn">Şifremi Güncelle</button>
      </form>
    </div>

    <p class="switch-link">
      <a href="/login">Giriş Sayfasına Dön</a>
    </p>
  </div>

  <script src="/js/alerts.js"></script>
  <script>
    let savedEmailOrPhone = "";

    function handleRequest(e) {
      e.preventDefault();
      const emailOrPhone = document.getElementById("emailOrPhone").value.trim();
      const errBox = document.getElementById("errorMsg");
      
      errBox.style.display = "none";

      if (!emailOrPhone) {
        errBox.textContent = "Lütfen e-posta veya telefon numaranızı girin.";
        errBox.style.display = "block";
        return;
      }

      fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ emailOrPhone })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          savedEmailOrPhone = emailOrPhone;
          
          // Switch steps
          document.getElementById("step1").classList.remove("active");
          document.getElementById("step2").classList.add("active");
          
          alert("Şifre sıfırlama kodunuz oluşturuldu! 🎉\nSimüle edilen kodu bir sonraki ekranda görebilirsiniz.");
          
          if (data.debug_code) {
            const demoBox = document.getElementById("demoCodeBox");
            demoBox.innerHTML = `🔑 Test Sıfırlama Kodu: <strong style="font-size: 15px;">${data.debug_code}</strong><br><span style="font-weight: normal; font-size: 11.5px; color:#555;">(Gerçek uygulamada SMS/E-posta ile gönderilir)</span>`;
            demoBox.style.display = "block";
            
            // Auto fill for convenience
            document.getElementById("resetCode").value = data.debug_code;
          }
        } else {
          errBox.textContent = data.error || "İstek başarısız oldu.";
          errBox.style.display = "block";
        }
      })
      .catch(err => {
        console.error("Forgot password error:", err);
        errBox.textContent = "Bağlantı hatası oluştu.";
        errBox.style.display = "block";
      });
    }

    function handleReset(e) {
      e.preventDefault();
      const resetCode = document.getElementById("resetCode").value.trim();
      const newPassword = document.getElementById("newPassword").value;
      const errBox = document.getElementById("errorMsg");
      
      errBox.style.display = "none";

      if (!resetCode || !newPassword) {
        errBox.textContent = "Lütfen tüm alanları doldurun.";
        errBox.style.display = "block";
        return;
      }

      fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          emailOrPhone: savedEmailOrPhone,
          resetCode,
          newPassword
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          alert("Şifreniz başarıyla güncellendi! 🎉\nYeni şifrenizle giriş sayfasına yönlendiriliyorsunuz.");
          setTimeout(() => {
            window.location.href = "/login";
          }, 2500);
        } else {
          errBox.textContent = data.error || "Şifre güncellenemedi.";
          errBox.style.display = "block";
        }
      })
      .catch(err => {
        console.error("Reset password error:", err);
        errBox.textContent = "Bağlantı hatası oluştu.";
        errBox.style.display = "block";
      });
    }
  </script>
</body>
</html>
